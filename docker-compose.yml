services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DSN: postgresql+asyncpg://hermes:hermes@postgres:5432/hermes_x
      REDIS_DSN: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      RUNTIME_ENABLE_REDIS_CLIENT: "true"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/runtime/liveness')"]
      interval: 20s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes_x
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/database/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_x"]
      interval: 10s
      timeout: 5s
      retries: 10
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/hermespassword
    volumes:
      - neo4j_data:/data
  flutter:
    image: ghcr.io/cirruslabs/flutter:stable
    profiles: ["frontend"]
    working_dir: /workspace/frontend/flutter_app
    volumes:
      - .:/workspace
    command: ["flutter", "run", "-d", "web-server", "--web-hostname", "0.0.0.0", "--web-port", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
