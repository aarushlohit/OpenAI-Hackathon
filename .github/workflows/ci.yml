name: hermes-x-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q app tests hermes.py main.py
      - run: python -m unittest discover -s tests
      - run: docker compose config

  runtime-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m unittest discover -s tests/integration
      - run: test -f app/database/postgres/migrations/001_initial.sql
