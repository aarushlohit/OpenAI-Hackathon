<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes-X — Evidence Analyzer</title>
    <style>
      * { box-sizing: border-box; }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        color: #1a1a2e;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      header h1 {
        font-size: 2.5rem;
        margin: 0 0 8px 0;
        font-weight: 700;
      }

      header p {
        font-size: 1rem;
        opacity: 0.95;
        margin: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 20px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
      }

      .card h2 {
        margin: 0 0 16px 0;
        font-size: 1.4rem;
        color: #667eea;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      textarea, input[type="file"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-family: 'Monaco', 'Menlo', monospace;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        margin-bottom: 14px;
      }

      textarea:focus, input[type="file"]:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 180px;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .result-box {
        margin-top: 20px;
        display: none;
      }

      .result-box.show {
        display: block;
      }

      .result-content {
        background: #f5f5f5;
        border-left: 4px solid #667eea;
        padding: 14px;
        border-radius: 6px;
        font-family: 'Monaco', 'Menlo', monospace;
        font-size: 0.9rem;
        max-height: 400px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .verdict {
        margin: 16px 0;
        padding: 14px;
        border-radius: 8px;
        font-weight: 600;
      }

      .verdict.critical {
        background: #ffebee;
        border-left: 4px solid #f44336;
        color: #c62828;
      }

      .verdict.high {
        background: #fff3e0;
        border-left: 4px solid #ff9800;
        color: #e65100;
      }

      .verdict.medium {
        background: #fff9c4;
        border-left: 4px solid #fbc02d;
        color: #f57f17;
      }

      .verdict.low {
        background: #e8f5e9;
        border-left: 4px solid #4caf50;
        color: #2e7d32;
      }

      .loader {
        display: none;
        text-align: center;
        margin: 12px 0;
      }

      .loader.show {
        display: block;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .error {
        background: #ffebee;
        border-left: 4px solid #f44336;
        color: #c62828;
        padding: 12px;
        border-radius: 6px;
        margin-top: 12px;
      }

      .success {
        color: #2e7d32;
        font-weight: 600;
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
        header h1 {
          font-size: 1.8rem;
        }
      }

      .file-name {
        color: #667eea;
        font-size: 0.9rem;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🔍 Hermes-X</h1>
        <p>Real-time Evidence Analysis powered by NVIDIA & Pollinations</p>
      </header>

      <div class="grid">
        <!-- TEXT EVIDENCE CARD -->
        <div class="card">
          <h2>📄 Text Evidence</h2>
          <textarea id="text" placeholder="Paste suspicious text, job offer, or message here..."></textarea>
          <button onclick="submitText()" id="textBtn">Analyze Text</button>
          <div class="loader" id="textLoader">
            <div class="spinner"></div>
          </div>
          <div class="result-box" id="textResult"></div>
        </div>

        <!-- IMAGE EVIDENCE CARD -->
        <div class="card">
          <h2>🖼️ Image Evidence</h2>
          <input type="file" id="file" accept="image/*" />
          <div class="file-name" id="fileName"></div>
          <button onclick="submitImage()" id="imgBtn">Analyze Image</button>
          <div class="loader" id="imgLoader">
            <div class="spinner"></div>
          </div>
          <div class="result-box" id="imgResult"></div>
        </div>
      </div>
    </div>

    <script>
      function formatResult(data, type) {
        let html = '';
        
        if (data.error) {
          return `<div class="error">Error: ${data.error}</div>`;
        }

        if (type === 'text' && data.result) {
          const res = data.result;
          const severity = res.severity || 'UNKNOWN';
          const riskScore = res.risk_score || 0;
          const signals = res.signals || [];
          const provider = res.provider || 'unknown';

          html += `<div class="verdict ${severity.toLowerCase()}">
            ⚠️ Risk Score: <strong>${riskScore}/100</strong> | Severity: <strong>${severity}</strong>
          </div>`;

          if (signals.length > 0) {
            html += '<div style="margin: 12px 0;"><strong>Detected Signals:</strong>';
            signals.forEach(s => {
              html += `<div style="margin: 8px 0; padding: 8px; background: #f5f5f5; border-radius: 4px;">
                <strong>${s.name}</strong> [${s.severity}] - ${(s.confidence * 100).toFixed(0)}%
              </div>`;
            });
            html += '</div>';
          }

          html += `<div style="font-size: 0.85rem; color: #999; margin-top: 12px;">
            Provider: <em>${provider}</em>
          </div>`;
        }

        if (type === 'image' && data.result) {
          const res = data.result;
          const isScam = res.is_scam;
          const confidence = res.confidence || 0;
          const provider = res.provider || 'unknown';

          const severity = isScam ? 'HIGH' : 'LOW';
          html += `<div class="verdict ${severity.toLowerCase()}">
            ${isScam ? '🚨 SCAM DETECTED' : '✅ LIKELY LEGITIMATE'} | Confidence: <strong>${(confidence * 100).toFixed(0)}%</strong>
          </div>`;

          html += `<div style="font-size: 0.85rem; color: #999; margin-top: 12px;">
            Provider: <em>${provider}</em>
          </div>`;
        }

        return html;
      }

      async function submitText() {
        const t = document.getElementById('text').value.trim();
        if (!t) {
          alert('Please enter text');
          return;
        }

        const btn = document.getElementById('textBtn');
        const loader = document.getElementById('textLoader');
        const resultBox = document.getElementById('textResult');

        btn.disabled = true;
        loader.classList.add('show');
        resultBox.classList.remove('show');

        try {
          const fd = new FormData();
          fd.append('text', t);
          const r = await fetch('/api/text', { method: 'POST', body: fd });
          const j = await r.json();
          
          resultBox.innerHTML = formatResult(j, 'text');
          resultBox.classList.add('show');
        } catch (e) {
          resultBox.innerHTML = `<div class="error">Network error: ${e.message}</div>`;
          resultBox.classList.add('show');
        } finally {
          btn.disabled = false;
          loader.classList.remove('show');
        }
      }

      document.getElementById('file').addEventListener('change', (e) => {
        const fn = e.target.files[0]?.name || '';
        document.getElementById('fileName').textContent = fn ? `📎 ${fn}` : '';
      });

      async function submitImage() {
        const f = document.getElementById('file').files[0];
        if (!f) {
          alert('Please choose an image file');
          return;
        }

        const btn = document.getElementById('imgBtn');
        const loader = document.getElementById('imgLoader');
        const resultBox = document.getElementById('imgResult');

        btn.disabled = true;
        loader.classList.add('show');
        resultBox.classList.remove('show');

        try {
          const fd = new FormData();
          fd.append('file', f);
          const r = await fetch('/api/image', { method: 'POST', body: fd });
          const j = await r.json();
          
          resultBox.innerHTML = formatResult(j, 'image');
          resultBox.classList.add('show');
        } catch (e) {
          resultBox.innerHTML = `<div class="error">Network error: ${e.message}</div>`;
          resultBox.classList.add('show');
        } finally {
          btn.disabled = false;
          loader.classList.remove('show');
        }
      }

      // Allow Enter key to submit text
      document.getElementById('text').addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') submitText();
      });
    </script>
  </body>
</html>
